<!DOCTYPE html>
<html>
<head>
    <title>Tessy's DevOps Project</title>

    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:80px;
            background:#f5f5f5;
        }

        button{
            padding:12px 20px;
            font-size:18px;
            cursor:pointer;
        }

        #result{
            margin-top:30px;
            font-size:22px;
            color:green;
        }
    </style>

</head>

<body>

<h1>🚀 Welcome to Tessy's DevOps Project</h1>

<p>Frontend running inside Kubernetes</p>

<button onclick="getMessage()">

Get Backend Message

</button>

<div id="result"></div>

<script>

async function getMessage(){

    const response = await fetch("/api");

    const data = await response.json();

    document.getElementById("result").innerHTML =
        data.message;

}

</script>

</body>

</html>
