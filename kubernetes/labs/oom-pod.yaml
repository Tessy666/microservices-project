apiVersion: v1

kind: Pod

metadata:
  name: oom-demo

spec:
  containers:
  - name: memory-demo

    image: polinux/stress

    command:
    - stress

    args:
    - "--vm"
    - "1"
    - "--vm-bytes"
    - "300M"
    - "--vm-hang"
    - "1"

    resources:
      requests:
        memory: "100Mi"
        cpu: "100m"

      limits:
        memory: "200Mi"
        cpu: "200m"
