apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: microservices

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: tessydocker/flask-backend:v100

        ports:
        - containerPort: 5000

        env:
        - name: WELCOME_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: WELCOME_MESSAGE

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
